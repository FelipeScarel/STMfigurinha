services:
  - type: web
    name: stickershop
    runtime: node
    plan: starter
    buildCommand: npm install && sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma && npx prisma generate && npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npx next build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stickershop-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UPLOAD_PROVIDER
        value: local

databases:
  - name: stickershop-db
    plan: free
